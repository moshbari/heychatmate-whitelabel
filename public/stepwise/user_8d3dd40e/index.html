<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mosh Bari's StepWise Guides</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
.header { background: linear-gradient(135deg, #1e293b, #0f172a); border-bottom: 1px solid #334155; padding: 40px 20px; text-align: center; }
.header h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
.header h1 em { background: linear-gradient(135deg, #f59e0b, #d97706); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-style: normal; }
.header .user-name { font-size: 20px; font-weight: 600; color: #f59e0b; margin-bottom: 4px; }
.header p { color: #94a3b8; font-size: 14px; }
.container { max-width: 800px; margin: 0 auto; padding: 30px 20px; }
.top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.count { font-size: 13px; color: #64748b; }
.manage-btn { background: #1e293b; border: 1px solid #334155; color: #94a3b8; padding: 8px 16px; border-radius: 8px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
.manage-btn:hover { border-color: #f59e0b; color: #f59e0b; }
.manage-btn.active { border-color: #ef4444; color: #ef4444; }
.guide-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.guide-card { flex: 1; background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; transition: all 0.2s; cursor: pointer; text-decoration: none; display: block; }
.guide-card:hover { border-color: #f59e0b; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(245,158,11,0.1); }
.guide-title { font-size: 17px; font-weight: 600; color: #f1f5f9; margin-bottom: 6px; }
.guide-meta { font-size: 12px; color: #64748b; display: flex; gap: 16px; flex-wrap: wrap; }
.guide-meta i { display: flex; align-items: center; gap: 4px; font-style: normal; }
.del-btn { display: none; background: #1e293b; border: 1px solid #ef4444; color: #ef4444; width: 42px; height: 42px; border-radius: 10px; cursor: pointer; font-size: 18px; transition: all 0.2s; flex-shrink: 0; }
.del-btn:hover { background: #ef4444; color: #fff; }
.managing .del-btn { display: flex; align-items: center; justify-content: center; }
.empty { text-align: center; padding: 60px 20px; color: #475569; }
.empty p { font-size: 15px; }
.footer { text-align: center; padding: 30px; color: #334155; font-size: 11px; }
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e293b; border: 1px solid #334155; color: #e2e8f0; padding: 12px 24px; border-radius: 10px; font-size: 13px; display: none; z-index: 999; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
.section-divider { margin: 40px 0 20px; padding-top: 20px; border-top: 1px solid #334155; }
.section-label { font-size: 13px; color: #64748b; margin-bottom: 14px; }
.video-card { flex: 1; background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; transition: all 0.2s; cursor: pointer; text-decoration: none; display: block; }
.video-card:hover { border-color: #6366f1; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(99,102,241,0.1); }
</style>
</head>
<body>
<div class="header"><div class="user-name">Mosh Bari's</div><h1><em>StepWise</em> Guides</h1><p>Step-by-step tutorials and documentation</p></div>
<div class="container" id="container">
<div class="top-bar"><div class="count">2 guides published</div><button class="manage-btn" id="manageBtn" onclick="toggleManage()">Manage</button></div>
<div class="guide-row">
<a class="guide-card" href="untitled-guide-2.html">
  <div class="guide-title">Untitled Guide</div>
  <div class="guide-meta">
    <i>&#x1F4C5; Feb 16, 2026</i>
    <i>&#x1F4CB; 3 steps</i>
    <i>&#x1F4E6; 537 KB</i>
  </div>
</a>
<button class="del-btn" onclick="deleteGuide('untitled-guide-2', this)" title="Delete">&#x1F5D1;</button>
</div>
<div class="guide-row">
<a class="guide-card" href="untitled-guide.html">
  <div class="guide-title">Untitled Guide</div>
  <div class="guide-meta">
    <i>&#x1F4C5; Feb 16, 2026</i>
    <i>&#x1F4CB; 3 steps</i>
    <i>&#x1F4E6; 537 KB</i>
  </div>
</a>
<button class="del-btn" onclick="deleteGuide('untitled-guide', this)" title="Delete">&#x1F5D1;</button>
</div>
</div>
<div class="toast" id="toast"></div>
<div class="footer">Powered by StepWise</div>
<script>
var apiUrl = "https://app.heychatmate.com/stepwise-api";
var secretKey = "";
var managing = false;

function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg; t.style.display = "block";
  setTimeout(function() { t.style.display = "none"; }, 3000);
}

function toggleManage() {
  var btn = document.getElementById("manageBtn");
  var container = document.getElementById("container");
  if (!managing) {
    var key = prompt("Enter your API key:");
    if (!key) return;
    secretKey = key.trim();
    fetch(apiUrl + "/list", { headers: { "Authorization": "Bearer " + secretKey } })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.success) {
          managing = true;
          container.classList.add("managing");
          btn.textContent = "Done";
          btn.classList.add("active");
          showToast("Manage mode ON \u2014 click the red buttons to delete");
        } else { showToast("Invalid key"); secretKey = ""; }
      }).catch(function() { showToast("Could not connect to server"); });
  } else {
    managing = false;
    container.classList.remove("managing");
    btn.textContent = "Manage";
    btn.classList.remove("active");
  }
}

function deleteGuide(slug, btn) {
  if (!confirm("Delete this guide permanently?")) return;
  btn.textContent = "...";
  fetch(apiUrl + "/delete/" + slug, {
    method: "DELETE",
    headers: { "Authorization": "Bearer " + secretKey }
  }).then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.success) {
        btn.closest(".guide-row").style.display = "none";
        showToast("Guide deleted!");
      } else { showToast("Delete failed: " + (d.error || "unknown")); btn.textContent = "\u{1F5D1}"; }
    }).catch(function(e) { showToast("Error: " + e.message); btn.textContent = "\u{1F5D1}"; });
}

function deleteVideo(videoId, btn) {
  if (!confirm("Delete this video link permanently?")) return;
  btn.textContent = "...";
  fetch(apiUrl + "/delete-video/" + videoId, {
    method: "DELETE",
    headers: { "Authorization": "Bearer " + secretKey }
  }).then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.success) {
        btn.closest(".guide-row").style.display = "none";
        showToast("Video link deleted!");
      } else { showToast("Delete failed: " + (d.error || "unknown")); btn.textContent = "\u{1F5D1}"; }
    }).catch(function(e) { showToast("Error: " + e.message); btn.textContent = "\u{1F5D1}"; });
}
</script>
</body>
</html>
